<div class="page-card">
	<div class="page-header">
		<h2 class="page-title"><i class="pi pi-users"></i> Clientes</h2>
		<a routerLink="/customer/insert">
			<p-button label="Nuevo Cliente" icon="pi pi-plus" size="small" />
		</a>
	</div>

	<p-table [value]="customers" [loading]="loading" [paginator]="true" [rows]="10"
		[showCurrentPageReport]="true" responsiveLayout="scroll"
		currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} registros"
		styleClass="p-datatable-sm p-datatable-striped">

		<ng-template pTemplate="header">
			<tr>
				<th>Nombres</th>
				<th>Apellidos</th>
				<th>Número de Documento</th>
				<th>Teléfono</th>
				<th>Correo Electrónico</th>
				<th>Dirección</th>
				<th style="width:120px">Acciones</th>
			</tr>
		</ng-template>

		<ng-template pTemplate="body" let-c>
			<tr>
				<td>{{c.firstName}}</td>
				<td>{{c.surName}}</td>
				<td>{{c.documentNumber}}</td>
				<td>{{c.phone ?? '-'}}</td>
				<td>{{c.email ?? '-'}}</td>
				<td>{{c.address ?? '-'}}</td>
				<td>
					<div class="action-buttons">
						<a [routerLink]="['/customer/insert']" [queryParams]="{id: c.idCustomer}">
							<p-button icon="pi pi-pencil" size="small" [text]="true" severity="info" pTooltip="Editar" />
						</a>
						<p-button icon="pi pi-trash" size="small" [text]="true" severity="danger"
							pTooltip="Eliminar" (click)="confirmDelete(c.idCustomer, c.firstName + ' ' + c.surName)" />
					</div>
				</td>
			</tr>
		</ng-template>

		<ng-template pTemplate="emptymessage">
			<tr><td colspan="7" class="text-center p-4">No se encontraron clientes.</td></tr>
		</ng-template>
	</p-table>
</div>
