<div class="page-card">
	<div class="page-header">
		<h2 class="page-title"><i class="pi pi-wrench"></i> Mecánicos</h2>
		<a routerLink="/mechanic/insert"><p-button label="Nuevo Mecánico" icon="pi pi-plus" size="small" /></a>
	</div>
	<p-table [value]="mechanics" [loading]="loading" [paginator]="true" [rows]="10"
		responsiveLayout="scroll" styleClass="p-datatable-sm p-datatable-striped">
		<ng-template pTemplate="header">
			<tr><th>Nombre</th><th>Especialidad</th><th>Teléfono</th><th style="width:120px">Acciones</th></tr>
		</ng-template>
		<ng-template pTemplate="body" let-m>
			<tr>
				<td>{{m.firstName}}</td><td>{{m.specialty}}</td><td>{{m.phone ?? '-'}}</td>
				<td>
					<div class="action-buttons">
						<a [routerLink]="['/mechanic/insert']" [queryParams]="{id: m.idMechanic}">
							<p-button icon="pi pi-pencil" size="small" [text]="true" severity="info" pTooltip="Editar" />
						</a>
						<p-button icon="pi pi-trash" size="small" [text]="true" severity="danger"
							pTooltip="Eliminar" (click)="confirmDelete(m.idMechanic, m.firstName)" />
					</div>
				</td>
			</tr>
		</ng-template>
		<ng-template pTemplate="emptymessage">
			<tr><td colspan="4" class="text-center p-4">No se encontraron mecánicos.</td></tr>
		</ng-template>
	</p-table>
</div>
