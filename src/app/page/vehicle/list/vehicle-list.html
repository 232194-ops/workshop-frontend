<div class="page-card">
	<div class="page-header">
		<h2 class="page-title"><i class="pi pi-car"></i> Vehículos</h2>
		<a routerLink="/vehicle/insert">
			<p-button label="Nuevo Vehículo" icon="pi pi-plus" size="small" />
		</a>
	</div>
	<p-table [value]="vehicles" [loading]="loading" [paginator]="true" [rows]="10"
		responsiveLayout="scroll" styleClass="p-datatable-sm p-datatable-striped">
		<ng-template pTemplate="header">
			<tr>
				<th>Marca</th><th>Modelo</th><th>Año</th><th>Placa</th>
				<th>Color</th><th>Cliente</th><th style="width:120px">Acciones</th>
			</tr>
		</ng-template>
		<ng-template pTemplate="body" let-v>
			<tr>
				<td>{{v.brand}}</td><td>{{v.model}}</td><td>{{v.year}}</td>
				<td><b>{{v.plate}}</b></td><td>{{v.color ?? '-'}}</td>
				<td>{{v.customerFullName}}</td>
				<td>
					<div class="action-buttons">
						<a [routerLink]="['/vehicle/insert']" [queryParams]="{id: v.idVehicle}">
							<p-button icon="pi pi-pencil" size="small" [text]="true" severity="info" pTooltip="Editar" />
						</a>
						<p-button icon="pi pi-trash" size="small" [text]="true" severity="danger"
							pTooltip="Eliminar" (click)="confirmDelete(v.idVehicle, v.plate)" />
					</div>
				</td>
			</tr>
		</ng-template>
		<ng-template pTemplate="emptymessage">
			<tr><td colspan="7" class="text-center p-4">No se encontraron vehículos.</td></tr>
		</ng-template>
	</p-table>
</div>
