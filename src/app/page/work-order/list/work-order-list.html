<div class="page-card">
	<div class="page-header">
		<h2 class="page-title"><i class="pi pi-clipboard"></i> Órdenes de Trabajo</h2>
		<a routerLink="/work-order/insert"><p-button label="Nueva Orden" icon="pi pi-plus" size="small" /></a>
	</div>
	<p-table [value]="orders" [loading]="loading" [paginator]="true" [rows]="10"
		responsiveLayout="scroll" styleClass="p-datatable-sm p-datatable-striped">
		<ng-template pTemplate="header">
			<tr>
				<th>Fecha de Ingreso</th><th>Vehículo</th><th>Mecánico</th>
				<th>Problema</th><th>Estado</th><th style="width:120px">Acciones</th>
			</tr>
		</ng-template>
		<ng-template pTemplate="body" let-o>
			<tr>
				<td>{{o.entryDate | date:'dd/MM/yyyy'}}</td>
				<td><b>{{o.vehiclePlate}}</b></td>
				<td>{{o.mechanicFirstName ?? '-'}}</td>
				<td class="problem-col">{{o.problemDescription}}</td>
				<td><p-tag [value]="statusLabels[o.status] || o.status" [severity]="statusSeverity[o.status]" /></td>
				<td>
					<div class="action-buttons">
						<a [routerLink]="['/work-order/insert']" [queryParams]="{id: o.idWorkOrder}">
							<p-button icon="pi pi-pencil" size="small" [text]="true" severity="info" pTooltip="Editar" />
						</a>
						<p-button icon="pi pi-trash" size="small" [text]="true" severity="danger"
							pTooltip="Eliminar" (click)="confirmDelete(o.idWorkOrder)" />
					</div>
				</td>
			</tr>
		</ng-template>
		<ng-template pTemplate="emptymessage">
			<tr><td colspan="6" class="text-center p-4">No se encontraron órdenes de trabajo.</td></tr>
		</ng-template>
	</p-table>
</div>
