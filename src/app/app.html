<p-toast />
<p-confirmdialog />

@if(isLoggedIn) {
<div class="layout-container">
	<header class="layout-topbar">
		<div class="topbar-left">
			<span class="app-logo">WORKSHOP</span>
		</div>
		<nav class="topbar-menu">
			@for(value of menuOptions; track value.route) {
				<a [routerLink]="value.route" [ngClass]="{ 'active-menu': value.active }">
					<i class="pi pi-{{value.icon}}"></i>
					<span>{{value.text}}</span>
				</a>
			}
		</nav>
		<div class="topbar-right">
			<div class="user-profile" (click)="menu.toggle($event)">
				<p-avatar icon="pi pi-user" shape="circle" />
				<span class="username">{{currentUser?.firstName}} {{currentUser?.surName}}</span>
				<i class="pi pi-angle-down"></i>
			</div>
			<p-menu #menu [model]="profileItems" [popup]="true" />
		</div>
	</header>
	<div class="layout-body">
		<main class="layout-main">
			<div class="content-wrapper">
				<router-outlet />
			</div>
		</main>
	</div>
</div>
} @else {
<router-outlet />
}
